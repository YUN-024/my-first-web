<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>윤채린 소개</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="smoke">
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
  </div>

  <div class="content">

    <div class="brush">
      <svg viewBox="0 0 240 260" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <filter id="roughA" x="-40%" y="-40%" width="180%" height="180%">
            <feTurbulence type="fractalNoise" baseFrequency="0.012 0.05" numOctaves="4" seed="7" result="n"/>
            <feDisplacementMap in="SourceGraphic" in2="n" scale="24" xChannelSelector="R" yChannelSelector="G"/>
          </filter>
          <filter id="roughB" x="-40%" y="-40%" width="180%" height="180%">
            <feTurbulence type="fractalNoise" baseFrequency="0.015 0.055" numOctaves="4" seed="23" result="n"/>
            <feDisplacementMap in="SourceGraphic" in2="n" scale="20" xChannelSelector="R" yChannelSelector="G"/>
          </filter>
        </defs>

        <g filter="url(#roughA)" transform="rotate(-9 66 135)" opacity="0.6">
          <rect x="34" y="40" width="64" height="190" rx="6" fill="#ffffff"/>
          <line x1="46" y1="48" x2="44" y2="222" stroke="#000000" stroke-opacity="0.12" stroke-width="3"/>
          <line x1="60" y1="45" x2="62" y2="225" stroke="#000000" stroke-opacity="0.08" stroke-width="2"/>
          <line x1="80" y1="50" x2="78" y2="220" stroke="#000000" stroke-opacity="0.1" stroke-width="3"/>
        </g>

        <g filter="url(#roughB)" transform="rotate(6 154 122)">
          <rect x="114" y="8" width="80" height="228" rx="6" fill="#ffffff"/>
          <line x1="128" y1="16" x2="126" y2="228" stroke="#000000" stroke-opacity="0.1" stroke-width="3"/>
          <line x1="150" y1="12" x2="152" y2="232" stroke="#000000" stroke-opacity="0.07" stroke-width="2"/>
          <line x1="172" y1="18" x2="170" y2="226" stroke="#000000" stroke-opacity="0.1" stroke-width="3"/>
          <line x1="184" y1="20" x2="186" y2="220" stroke="#000000" stroke-opacity="0.08" stroke-width="2"/>
        </g>
      </svg>
    </div>

    <h1>Yoon Chaelynn</h1>

    <ul class="tags">
      <li>짙은 초록</li>
      <li>음악과 바람</li>
      <li>우연과 필연</li>
    </ul>

  </div>

  <p class="credit">© Yoon Chaelynn</p>

  <script src="script.js"></script>
</body>
</html>
