<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>팩맨 - PIXEL LAB</title>
<script src="js/theme.js"></script>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="topbar">
    <a class="logo" href="index.html">PIXEL LAB</a>
    <button id="theme-toggle" class="theme-toggle">LIGHT</button>
  </div>
  <div class="container">
    <a class="back-link" href="game.html">&larr; 미니게임 선택</a>
    <h2>팩맨</h2>
    <p style="color:var(--text-dim)">방향키로 이동하세요. 모든 코인을 먹으면 클리어!</p>

    <div style="display:flex; justify-content:center; gap:32px; font-family:'Press Start 2P'; font-size:12px; margin-bottom:10px;">
      <div>SCORE: <span id="pac-score">0</span></div>
      <div>LIVES: <span id="pac-lives">3</span></div>
    </div>

    <div style="text-align:center;">
      <canvas id="pacman-canvas" width="380" height="420" style="background:#000; border:3px solid var(--border); box-shadow: var(--shadow);"></canvas>
    </div>
    <p id="pac-message" style="text-align:center; font-family:'Press Start 2P'; font-size:14px; color:var(--accent-yellow);"></p>
    <div style="text-align:center; margin-top:10px;">
      <button class="btn btn-cyan" id="pac-restart">재시작</button>
    </div>

    <!-- mobile controls -->
    <div style="display:flex; justify-content:center; margin-top:16px;">
      <div style="display:grid; grid-template-columns: repeat(3, 50px); grid-template-rows: repeat(3,50px); gap:4px;">
        <div></div><button class="btn" data-dir="up">↑</button><div></div>
        <button class="btn" data-dir="left">←</button><div></div><button class="btn" data-dir="right">→</button>
        <div></div><button class="btn" data-dir="down">↓</button><div></div>
      </div>
    </div>
  </div>
<script src="js/pacman.js"></script>
</body>
</html>
