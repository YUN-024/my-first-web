<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>오목 - PIXEL LAB</title>
<script src="js/theme.js"></script>
<link rel="stylesheet" href="css/style.css">
<style>
  #omok-board {
    display: grid;
    grid-template-columns: repeat(15, 32px);
    grid-template-rows: repeat(15, 32px);
    background: var(--surface-2);
    border: 4px solid var(--border);
    box-shadow: var(--shadow);
    margin: 0 auto;
  }
  .cell {
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; line-height: 1; cursor: pointer; user-select: none;
    position: relative; box-sizing: border-box;
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
  }
  .cell.col-last { border-right: none; }
  .cell.row-last { border-bottom: none; }
  .cell:hover:not(.stone-black):not(.stone-white) { background: rgba(255,255,255,0.08); }
  .cell.lastmove::before {
    content: ''; position: absolute; inset: 4px;
    outline: 2px solid var(--accent-yellow); outline-offset: -2px;
  }
  .stone-black { color: #14141c; text-shadow: 1px 1px 0 #888, -1px -1px 0 #888, 1px -1px 0 #888, -1px 1px 0 #888; }
  .stone-white { color: #f5f5f5; text-shadow: 1px 1px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000; }

  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.65);
    display: none; align-items: center; justify-content: center; z-index: 50;
  }
  .modal-overlay.open { display: flex; }
  .modal-box {
    background: var(--surface); border: 4px solid var(--border); box-shadow: var(--shadow);
    padding: 24px; text-align: center; max-width: 320px;
  }
  .modal-box p { font-size: 13px; line-height: 1.6; margin-bottom: 16px; }
  .modal-buttons { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
</style>
</head>
<body>
  <header class="site-header">
    <a href="game.html" class="btn back-btn">◀ 목록으로</a>
    <h1 class="page-title">⚫ 오목</h1>
    <button id="theme-toggle" class="theme-toggle" aria-label="테마 전환"></button>
  </header>
  <div class="container">
    <div style="text-align:center; margin-bottom:14px;">
      <label style="margin-right:16px;"><input type="radio" name="omok-mode" id="mode-pvp" value="pvp" checked> 2인 대전</label>
      <label><input type="radio" name="omok-mode" id="mode-ai" value="ai"> 컴퓨터와 대전 (흑, AI는 백)</label>
    </div>

    <div style="text-align:center; font-family:'Press Start 2P'; font-size:13px; margin-bottom:10px;">
      TURN: <span id="turn-label">BLACK</span>
    </div>

    <div class="game-stage" style="width:max-content; margin:0 auto;">
      <div id="omok-board"></div>
      <div id="omok-overlay" class="game-overlay">
        <div class="panel">
          <h2 id="omok-result-title"></h2>
          <div id="omok-result-message" class="pixel-font" style="font-size:14px; color:var(--accent-yellow);"></div>
          <button class="btn btn-cyan" id="omok-restart">새 게임</button>
        </div>
      </div>
    </div>

    <p id="omok-message" style="text-align:center; font-family:'Press Start 2P'; font-size:14px; color:var(--accent-yellow);"></p>
    <div style="text-align:center; margin-top:10px;">
      <button class="btn btn-cyan" id="omok-restart-manual">새 게임</button>
    </div>
  </div>

  <div id="modal-overlay" class="modal-overlay">
    <div class="modal-box">
      <p id="modal-message" class="pixel-font"></p>
      <div id="modal-buttons" class="modal-buttons"></div>
    </div>
  </div>

<script src="js/omok.js"></script>
</body>
</html>
