<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>두더지 게임 - PIXEL LAB</title>
<script src="js/theme.js"></script>
<link rel="stylesheet" href="css/style.css">
<style>
  .mole-grid { display:grid; gap:12px; max-width:480px; margin:20px auto; }
  .hole { background:var(--surface-2); border:3px solid var(--border); aspect-ratio:1; display:flex; align-items:center; justify-content:center; cursor:pointer; overflow:hidden; }
  .mole-emoji { font-size:2.4rem; line-height:1; opacity:0; transform: scale(0.2); transition: opacity .15s ease, transform .15s ease; }
  .mole-emoji.up { opacity:1; transform: scale(1); }
  .stat-row { display:flex; justify-content:center; gap:32px; margin-bottom:10px; font-family:'Press Start 2P',monospace; font-size:13px; }
</style>
</head>
<body>
  <header class="site-header">
    <a href="game.html" class="btn back-btn">◀ 목록으로</a>
    <h1 class="page-title">🔨 두더지 게임</h1>
    <button id="theme-toggle" class="theme-toggle" aria-label="테마 전환"></button>
  </header>
  <div class="container">
    <div class="panel" style="text-align:center; font-size:18px;">
      💗 하트가 나오면 클릭하세요! <span style="color:var(--accent-cyan);">+1점</span><br>
      💣 폭탄이 나오면 클릭하지 마세요! <span style="color:var(--accent-pink);">-1점</span><br>
      <span style="color:var(--text-dim); font-size:15px;">시간이 지날수록 점점 빨라집니다.</span>
    </div>

    <div class="stat-row">
      <div>SCORE: <span id="score">0</span></div>
      <div>TIME: <span id="time">30</span>s</div>
      <div>HIGH SCORE: <span id="high-score">0</span></div>
    </div>
    <div style="text-align:center; margin-bottom:16px;">
      <label>판 크기</label>
      <select id="grid-size">
        <option value="3">3 x 3</option>
        <option value="4">4 x 4</option>
        <option value="5">5 x 5</option>
      </select>
      <button class="btn btn-cyan" id="start-btn">게임 시작</button>
    </div>
    <div class="game-stage">
      <div class="mole-grid" id="mole-grid"></div>
      <div id="game-overlay" class="game-overlay">
        <div class="panel">
          <h2>게임 종료!</h2>
          <div id="final-score" class="pixel-font" style="font-size:14px; color:var(--accent-yellow);"></div>
          <div id="new-record" class="new-record pixel-font" style="font-size:13px;"></div>
          <button class="btn btn-cyan" id="restart-btn">다시하기</button>
        </div>
      </div>
    </div>
  </div>
<script src="js/mole.js"></script>
</body>
</html>
