<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>도트 그림판 - PIXEL LAB</title>
<script src="js/theme.js"></script>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header">
    <a href="index.html" class="btn back-btn">◀ 메인 화면으로</a>
    <h1 class="page-title">도트 그림판</h1>
    <button id="theme-toggle" class="theme-toggle" aria-label="테마 전환"></button>
  </header>

  <div class="container">
    <div class="panel" style="display:flex; gap:16px; flex-wrap:wrap; align-items:center;">
      <div>
        <button class="btn btn-cyan" id="tool-pencil">연필</button>
        <button class="btn" id="tool-eraser">지우개</button>
      </div>
      <div>
        <label>색상 팔레트</label>
        <div class="palette-row" id="palette-row"></div>
      </div>
      <div>
        <label>커스텀</label>
        <input type="color" id="color-picker" value="#4ce0d2">
      </div>
      <div>
        <label>두께 (1~10px)</label>
        <input type="range" id="brush-size" min="1" max="10" value="2" step="1">
        <span id="brush-size-label" class="pixel-font" style="font-size:12px;">2px</span>
      </div>
      <div>
        <label>격자</label>
        <input type="checkbox" id="grid-toggle" checked>
      </div>
      <div>
        <label><input type="checkbox" id="snap-toggle"> 칸에 맞춰 채우기</label>
      </div>
      <button class="btn" id="undo-btn">되돌리기</button>
      <button class="btn" id="redo-btn">다시실행</button>
      <button class="btn btn-pink" id="clear-btn">전체 지우기</button>
      <button class="btn btn-cyan" id="save-btn">💾 이미지 저장</button>
    </div>

    <div class="panel" style="text-align:center;">
      <div style="position:relative; display:inline-block;">
        <canvas id="paint-canvas" width="512" height="512" style="background:#ffffff; border:3px solid var(--border); cursor:crosshair; touch-action:none; display:block;"></canvas>
        <canvas id="grid-overlay" width="512" height="512" style="position:absolute; top:0; left:0; pointer-events:none;"></canvas>
      </div>
    </div>
  </div>

<script src="js/paint.js"></script>
</body>
</html>
