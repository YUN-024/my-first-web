<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>도트 그림판 - PIXEL LAB</title>
<script src="js/theme.js"></script>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="topbar">
    <a class="logo" href="index.html">PIXEL LAB</a>
    <button id="theme-toggle" class="theme-toggle">LIGHT</button>
  </div>

  <div class="container">
    <a class="back-link" href="index.html">&larr; 메인으로</a>
    <h2>도트 그림판</h2>

    <div class="panel" style="display:flex; gap:16px; flex-wrap:wrap; align-items:center;">
      <div>
        <label>색상</label>
        <input type="color" id="color-picker" value="#4ce0d2">
      </div>
      <div>
        <label>두께 (1~10px)</label>
        <input type="range" id="brush-size" min="1" max="10" value="2" step="1">
        <span id="brush-size-label" class="pixel-font" style="font-size:12px;">2px</span>
      </div>
      <div>
        <label>격자</label>
        <input type="checkbox" id="grid-toggle" checked>
      </div>
      <button class="btn btn-pink" id="clear-btn">전체 지우기</button>
      <button class="btn btn-cyan" id="save-btn">이미지 저장</button>
    </div>

    <div class="panel" style="text-align:center;">
      <canvas id="paint-canvas" width="512" height="512" style="background:#ffffff; border:3px solid var(--border); cursor:crosshair; touch-action:none;"></canvas>
    </div>
  </div>

<script src="js/paint.js"></script>
</body>
</html>
