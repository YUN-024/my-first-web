<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>체스 · 픽셀 도트 월드</title>
  <script>
    document.documentElement.setAttribute('data-theme', localStorage.getItem('pixelsite-theme') || 'dark');
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Silkscreen:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles.css">
  <link rel="stylesheet" href="chess.css">
</head>
<body>
  <div class="page">
    <header class="site-header">
      <a href="index.html" class="pixel-btn back-btn">◀ 목록으로</a>
      <h1 class="page-title">체스</h1>
      <button id="theme-toggle" class="pixel-btn theme-toggle" aria-label="테마 전환"></button>
    </header>

    <div class="page-body">
      <div class="game-hud">
        <div>
          <div class="stat-label">차례</div>
          <div id="turn-indicator">백</div>
        </div>
        <div>
          <div class="stat-label">상태</div>
          <div id="status-text">대기 중</div>
        </div>
        <div>
          <div class="stat-label">모드</div>
          <div id="mode-text">-</div>
        </div>
      </div>

      <div class="chess-field">
        <div class="captured-tray" id="captured-black" aria-label="흑이 잡힌 기물"></div>

        <div class="chess-board-wrap">
          <div class="chess-board" id="chess-board"></div>
        </div>

        <div class="captured-tray" id="captured-white" aria-label="백이 잡힌 기물"></div>

        <!-- Mode selection overlay -->
        <div class="game-overlay visible" id="mode-overlay">
          <div class="pixel-panel">
            <h2>체스</h2>
            <div class="chess-overlay-msg">모드를 선택하세요</div>
            <button class="pixel-btn pixel-btn--lg" id="mode-ai-btn">AI와 대결</button>
            <button class="pixel-btn pixel-btn--lg" id="mode-2p-btn">2인 대전</button>
          </div>
        </div>

        <!-- Game result overlay -->
        <div class="game-overlay" id="result-overlay">
          <div class="pixel-panel">
            <h2 id="result-title">게임 종료!</h2>
            <div id="result-message"></div>
            <button class="pixel-btn pixel-btn--lg" id="restart-btn">다시하기</button>
          </div>
        </div>
      </div>

      <p class="chess-hint">기물을 클릭하면 이동 가능한 칸이 표시됩니다</p>
    </div>
  </div>

  <script src="../theme.js"></script>
  <script src="chess.js"></script>
</body>
</html>
