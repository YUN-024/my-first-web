<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>도트 그림판 · 픽셀 도트 월드</title>
  <script>
    document.documentElement.setAttribute('data-theme', localStorage.getItem('pixelsite-theme') || 'dark');
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Silkscreen:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page">
    <header class="site-header">
      <a href="index.html" class="pixel-btn back-btn">◀ 처음으로</a>
      <h1 class="page-title">도트 그림판</h1>
      <button id="theme-toggle" class="pixel-btn theme-toggle" aria-label="테마 전환"></button>
    </header>

    <div class="page-body">
      <div class="paint-layout">
        <div class="canvas-wrap">
          <canvas id="paint-canvas" width="512" height="512"></canvas>
          <div class="grid-overlay" id="grid-overlay"></div>
        </div>

        <div class="paint-controls pixel-panel">
          <div>
            <div class="stat-label" style="color:var(--text-muted);font-size:0.65rem;margin-bottom:8px;">색상 팔레트</div>
            <div class="palette-row" id="palette-row"></div>
            <div class="color-picker-row" style="margin-top:10px;">
              <label for="custom-color">커스텀:</label>
              <input type="color" id="custom-color" value="#ffd447">
            </div>
          </div>

          <div class="control-row">
            <button class="pixel-btn" id="toggle-grid-btn">격자 끄기</button>
            <button class="pixel-btn" id="clear-btn">지우기</button>
          </div>

          <div class="brush-row">
            <span style="font-size:0.65rem;color:var(--text-muted);">브러시 크기:</span>
            <button class="pixel-btn active" data-size="1">1</button>
            <button class="pixel-btn" data-size="2">2</button>
            <button class="pixel-btn" data-size="3">3</button>
            <button class="pixel-btn" data-size="4">4</button>
          </div>

          <button class="pixel-btn pixel-btn--lg" id="save-btn">💾 저장하기</button>
        </div>
      </div>
    </div>
  </div>

  <script src="theme.js"></script>
  <script src="paint.js"></script>
</body>
</html>
