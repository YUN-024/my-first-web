<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>아바타 만들기 - PIXEL LAB</title>
<script src="js/theme.js"></script>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="topbar">
    <a class="logo" href="index.html">PIXEL LAB</a>
    <button id="theme-toggle" class="theme-toggle">LIGHT</button>
  </div>

  <div class="container">
    <a class="back-link" href="index.html">&larr; 메인으로</a>
    <h2>아바타 만들기</h2>
    <p style="color:var(--text-dim)">3등신 전신 도트 아바타를 자유롭게 꾸며보세요.</p>

    <div class="panel" style="display:flex; gap:32px; flex-wrap:wrap; align-items:flex-start;">
      <canvas id="avatar-canvas" width="240" height="320" style="background:var(--surface-2); border:3px solid var(--border);"></canvas>

      <div style="flex:1; min-width:260px;">
        <div style="margin-bottom:14px;">
          <label>헤어 스타일</label>
          <select id="hair-style">
            <option value="short">짧은 머리</option>
            <option value="long">긴 머리</option>
            <option value="spiky">뾰족 머리</option>
            <option value="bald">민머리</option>
          </select>
          <input type="color" id="hair-color" value="#3a2a1a">
        </div>

        <div style="margin-bottom:14px;">
          <label>피부톤</label>
          <input type="color" id="skin-color" value="#f2c299">
        </div>

        <div style="margin-bottom:14px;">
          <label>눈 모양</label>
          <select id="eye-style">
            <option value="dot">동그란 눈</option>
            <option value="line">감은 눈</option>
            <option value="star">반짝이는 눈</option>
          </select>
        </div>

        <div style="margin-bottom:14px;">
          <label>상의</label>
          <select id="top-style">
            <option value="tshirt">티셔츠</option>
            <option value="hoodie">후드</option>
            <option value="jacket">재킷</option>
          </select>
          <input type="color" id="top-color" value="#4ce0d2">
        </div>

        <div style="margin-bottom:14px;">
          <label>하의</label>
          <select id="bottom-style">
            <option value="pants">긴 바지</option>
            <option value="shorts">반바지</option>
            <option value="skirt">치마</option>
          </select>
          <input type="color" id="bottom-color" value="#2b2b3d">
        </div>

        <div style="margin-bottom:14px;">
          <label>신발</label>
          <input type="color" id="shoe-color" value="#ff5da2">
        </div>

        <div style="margin-bottom:14px;">
          <label>모자/액세서리</label>
          <select id="hat-style">
            <option value="none">없음</option>
            <option value="cap">캡모자</option>
            <option value="ribbon">리본</option>
          </select>
        </div>

        <button class="btn btn-cyan" id="download-avatar">아바타 저장 (PNG)</button>
      </div>
    </div>
  </div>

<script src="js/avatar.js"></script>
</body>
</html>
