<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>체스 - PIXEL LAB</title>
<script src="js/theme.js"></script>
<link rel="stylesheet" href="css/style.css">
<style>
  #chess-board {
    display: grid;
    grid-template-columns: repeat(8, 44px);
    grid-template-rows: repeat(8, 44px);
    border: 4px solid var(--border);
    box-shadow: var(--shadow);
    margin: 0 auto;
  }
  .sq { display:flex; align-items:center; justify-content:center; font-size:28px; cursor:pointer; user-select:none; position:relative; }
  .sq.light { background: var(--surface-2); }
  .sq.dark { background: var(--bg); }
  .sq.selected { outline: 3px solid var(--accent-yellow); outline-offset: -3px; }
  .sq.movable::after { content:''; position:absolute; width:14px; height:14px; background: var(--accent-cyan); opacity:0.6; }
  .sq.capturable { outline: 3px solid var(--accent-pink); outline-offset: -3px; }
  .sq.lastmove { box-shadow: inset 0 0 0 4px rgba(255,210,63,0.5); }
  .sq.in-check { box-shadow: inset 0 0 0 4px rgba(255,85,85,0.6); }
  .white-piece { color: #f5f5f5; text-shadow: 1px 1px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000; }
  .black-piece { color: #14141c; text-shadow: 1px 1px 0 #888; }

  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.65);
    display: none; align-items: center; justify-content: center; z-index: 50;
  }
  .modal-overlay.open { display: flex; }
  .modal-box {
    background: var(--surface); border: 4px solid var(--border); box-shadow: var(--shadow);
    padding: 24px; text-align: center; max-width: 320px;
  }
  .modal-box p { font-size: 13px; line-height: 1.6; margin-bottom: 16px; }
  .modal-buttons { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
</style>
</head>
<body>
  <header class="site-header">
    <a href="game.html" class="btn back-btn">◀ 목록으로</a>
    <h1 class="page-title">♟ 체스</h1>
    <button id="theme-toggle" class="theme-toggle" aria-label="테마 전환"></button>
  </header>
  <div class="container">
    <div style="text-align:center; margin-bottom:14px;">
      <label style="margin-right:16px;"><input type="radio" name="chess-mode" id="mode-pvp" value="pvp" checked> 2인 대전</label>
      <label><input type="radio" name="chess-mode" id="mode-ai" value="ai"> 컴퓨터와 대전 (흑, AI)</label>
    </div>

    <div style="text-align:center; font-family:'Press Start 2P'; font-size:13px; margin-bottom:10px;">
      TURN: <span id="turn-label">WHITE</span>
    </div>

    <div id="captured-black" style="text-align:center; min-height:24px; font-size:20px; color:var(--text-dim);"></div>

    <div class="game-stage" style="width:max-content; margin:0 auto;">
      <div id="chess-board"></div>
      <div id="chess-overlay" class="game-overlay">
        <div class="panel">
          <h2 id="chess-result-title"></h2>
          <div id="chess-result-message" class="pixel-font" style="font-size:14px; color:var(--accent-yellow);"></div>
          <button class="btn btn-cyan" id="chess-restart">새 게임</button>
        </div>
      </div>
    </div>

    <div id="captured-white" style="text-align:center; min-height:24px; font-size:20px; color:var(--text-dim);"></div>

    <p id="chess-message" style="text-align:center; font-family:'Press Start 2P'; font-size:14px; color:var(--accent-yellow);"></p>
    <div style="text-align:center; margin-top:10px;">
      <button class="btn btn-cyan" id="chess-restart-manual">새 게임</button>
    </div>
  </div>

  <div id="modal-overlay" class="modal-overlay">
    <div class="modal-box">
      <p id="modal-message" class="pixel-font"></p>
      <div id="modal-buttons" class="modal-buttons"></div>
    </div>
  </div>

<script src="js/chess.js"></script>
</body>
</html>
