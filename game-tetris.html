<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>테트리스 - PIXEL LAB</title>
<script src="js/theme.js"></script>
<link rel="stylesheet" href="css/style.css">
<style>
  .tetris-stat-row {
    display: flex;
    justify-content: center;
    gap: 24px;
    flex-wrap: wrap;
    font-family: 'Press Start 2P', monospace;
    font-size: 12px;
    margin-bottom: 10px;
  }
  .tetris-layout {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    gap: 20px;
    flex-wrap: wrap;
  }
  .tetris-side {
    width: 130px;
    text-align: center;
  }
  .tetris-side h3 {
    font-size: 11px;
    color: var(--text-dim);
    margin: 0 0 12px;
  }
  #tetris-next-canvas {
    background: #000;
    border: 3px solid var(--border);
    image-rendering: pixelated;
  }
  #tetris-canvas {
    background: #000;
    border: 3px solid var(--border);
    box-shadow: var(--shadow);
    image-rendering: pixelated;
    display: block;
  }
  .tetris-help {
    color: var(--text-dim);
    font-size: 14px;
    line-height: 1.7;
    margin-top: 14px;
    text-align: left;
  }
</style>
</head>
<body>
  <header class="site-header">
    <a href="game.html" class="btn back-btn">◀ 목록으로</a>
    <h1 class="page-title">🧱 테트리스</h1>
    <button id="theme-toggle" class="theme-toggle" aria-label="테마 전환"></button>
  </header>
  <div class="container">
    <p style="color:var(--text-dim); text-align:center;">방향키로 이동/회전하고, 스페이스바로 즉시 낙하시키세요!</p>

    <div class="tetris-stat-row">
      <div>SCORE: <span id="tetris-score">0</span></div>
      <div>LINES: <span id="tetris-lines">0</span></div>
      <div>LEVEL: <span id="tetris-level">1</span></div>
      <div>HIGH SCORE: <span id="tetris-high-score">0</span></div>
    </div>

    <div class="tetris-layout">
      <div class="game-stage">
        <canvas id="tetris-canvas" width="200" height="400"></canvas>
        <div id="tetris-overlay" class="game-overlay">
          <div class="panel">
            <h2 id="tetris-result-title">게임 오버</h2>
            <div id="tetris-final-score" class="pixel-font" style="font-size:14px; color:var(--accent-yellow);"></div>
            <div id="tetris-new-record" class="new-record pixel-font" style="font-size:13px;"></div>
            <button class="btn btn-cyan" id="tetris-restart">재시작</button>
          </div>
        </div>
      </div>

      <div class="panel tetris-side">
        <h3 class="pixel-font">NEXT</h3>
        <canvas id="tetris-next-canvas" width="100" height="100"></canvas>
        <div class="tetris-help">
          ← → 이동<br>
          ↑ 회전<br>
          ↓ 소프트 드롭<br>
          Space 하드 드롭
        </div>
      </div>
    </div>
  </div>
<script src="js/tetris.js"></script>
</body>
</html>
